name: DriftCode Auditor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DriftCode Auditor
        run: pip install driftcode-auditor

      - name: Run DriftCode Auditor
        run: |
          driftcode-auditor --path . --privacy --maintainability --format md --output driftcode-report.md || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: driftcode-report
          path: driftcode-report.md
